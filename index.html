    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            user-select: none;
            overflow-x: hidden;
            transition: background-color 0.1s, color 0.3s;
        }

        .piano-container {
            display: flex;
            background: #1e293b;
            padding: 24px 24px 0 24px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.05);
            overflow-x: auto;
            border: 1px solid #334155;
            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;
        }

        .white {
            width: 54px; height: 200px;
            background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 0 0 6px 6px;
            cursor: pointer; box-shadow: inset 0 -4px 6px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.05s ease; position: relative; z-index: 1;
        }
        .white.active {
            background: #3b82f6; transform: translateY(2px);
        }

        .black {
            width: 34px; height: 120px;
            background: linear-gradient(to bottom, #334155 0%, #0f172a 100%);
            border-radius: 0 0 4px 4px; cursor: pointer;
            z-index: 10; transition: all 0.05s ease; position: absolute; top: 0; right: -17px; 
        }
        .black.active {
            background: #2563eb; transform: translateY(2px);
        }

        .typewriter-box {
            background: #020617;
            border: 2px solid #334155;
            font-family: 'Courier New', Courier, monospace;
            min-height: 120px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.25rem;
            color: #22c55e;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 200px;
        }

        .collapsible { transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out; overflow: hidden; }
        .collapsed { max-height: 0; opacity: 0; margin: 0 !important; padding: 0 !important; border: none !important;}

        body.high-contrast { background-color: #ffffff; color: #000000; }
        body.high-contrast .bg-slate-800, 
        body.high-contrast .bg-slate-800\/40, 
        body.high-contrast .typewriter-box, 
        body.high-contrast .piano-container { 
            background: #ffffff !important; border: 2px solid #000 !important; color: #000 !important;
        }
        
        body.high-contrast input[type="text"] {
            background-color: #ffffff !important;
            color: #000000 !important;
            border: 2px solid #000000 !important;
        }
        
        body.high-contrast input::placeholder {
            color: #4b5563 !important;
            opacity: 1;
        }

        body.high-contrast select {
            background-color: #ffffff !important;
            color: #000000 !important;
            border: 2px solid #000000 !important;
        }

        body.high-contrast .text-slate-400, 
        body.high-contrast .text-cyan-400 { 
            color: #000000 !important; 
            font-weight: bold;
        }

        input[type=range] {
            -webkit-appearance: none;
            background: #334155;
            height: 4px;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
        
        body.high-contrast input[type=range] {
            background: #000000 !important;
        }

        let masterGain, reverbNode, dryGain, wetGain;

        const sfNames = ["acoustic_grand_piano", "bright_acoustic_piano", "electric_grand_piano", "honkytonk_piano", "electric_piano_1", "harpsichord", "clavi", "celesta", "glockenspiel", "vibraphone", "marimba", "xylophone", "tubular_bells", "drawbar_organ", "church_organ", "accordion", "acoustic_guitar_nylon", "acoustic_guitar_steel", "electric_guitar_clean", "acoustic_bass", "violin", "cello", "string_ensemble_1", "choir_aahs", "trumpet", "trombone", "french_horn", "alto_sax", "oboe", "clarinet", "flute", "recorder", "pan_flute"];
        const gmNames = ["Piano Acústico", "Piano Brilhante", "Piano Elétrico", "Piano Honky-tonk", "Piano Rhodes", "Cravo", "Clavinete", "Celesta", "Glockenspiel", "Vibrafone", "Marimba", "Xilofone", "Sinos Tubulares", "Órgão Drawbar", "Órgão de Tubos", "Acordeão", "Violão Nylon", "Violão Aço", "Guitarra Limpa", "Baixo Acústico", "Violino", "Violoncelo", "Conjunto de Cordas", "Coro", "Trompete", "Trombone", "Trompa", "Sax Alto", "Oboé", "Clarinete", "Flauta", "Flauta Doce", "Flauta de Pã"];

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new AudioContext();
            masterGain = audioCtx.createGain();
            
            reverbNode = audioCtx.createConvolver();
            const length = audioCtx.sampleRate * 2.5;
            const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
            for (let i = 0; i < 2; i++) {
                const channel = impulse.getChannelData(i);
                for (let j = 0; j < length; j++) channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 2.5);
            }
            reverbNode.buffer = impulse;

            dryGain = audioCtx.createGain();
            wetGain = audioCtx.createGain();
            dryGain.gain.value = 1.0;
            wetGain.gain.value = state.reverb;

            masterGain.connect(dryGain);
            masterGain.connect(reverbNode);
            reverbNode.connect(wetGain);
            dryGain.connect(audioCtx.destination);
            wetGain.connect(audioCtx.destination);

            loadInstrument();
        }

        async function loadInstrument() {
            if (!audioCtx) initAudio();
            instrument = await Soundfont.instrument(audioCtx, sfNames[state.prog], { destination: masterGain });
        }

        function playClick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const clickGain = audioCtx.createGain();
            osc.connect(clickGain);
            clickGain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            clickGain.gain.setValueAtTime(metronome.volume, audioCtx.currentTime);
            clickGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function toggleMetronome() {
            metronome.isPlaying = !metronome.isPlaying;
            const btn = document.getElementById('metronome-toggle');
            if (metronome.isPlaying) {
                btn.innerHTML = '<i data-lucide="square" class="w-4 h-4 text-red-500"></i>';
                const interval = 60000 / metronome.bpm;
                metronome.timer = setInterval(playClick, interval);
                playClick();
            } else {
                btn.innerHTML = '<i data-lucide="play" class="w-4 h-4 text-green-500"></i>';
                clearInterval(metronome.timer);
            }
            lucide.createIcons();
        }

        function addToTypewriter(noteName) {
            typewriterData.noteCount++;
            typewriterData.text += noteName + " ";
            
            if (typewriterData.noteCount % 4 === 0) {
                typewriterData.measureCount++;
                typewriterData.text += "| " + typewriterData.measureCount + " ";
            }
            
            const display = document.getElementById('typewriter-display');
            display.textContent = typewriterData.text;
            display.scrollTop = display.scrollHeight;
        }

        function copyFormatted() {
            const name = document.getElementById('user-name').value || "Usuário Não Identificado";
            const date = new Date().toLocaleDateString('pt-BR');
            const title = "Treinador de inserção de notas musicais em teclado QWERTY";
            
            let performanceText = typewriterData.text;
            performanceText = performanceText.replace(/\|\s(\d+)\s/g, (match, p1) => {
                const measureNum = parseInt(p1);
                if ((measureNum - 1) % 4 === 0 && measureNum > 1) {
                    return "|\n" + p1 + " ";
                }
                return match;
            });

            const fullText = `${title}\nNome: ${name}\nData: ${date}\n--------------------------\n${performanceText}\n${typewriterData.nextQuote}`;
            
            const tempInput = document.createElement("textarea");
            tempInput.value = fullText;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand("copy");
                const btn = document.getElementById('copy-text');
                const original = btn.innerHTML;
                btn.innerHTML = "COPIADO!";
                setTimeout(() => btn.innerHTML = original, 2000);
            } catch (err) {
                console.error("Falha ao copiar", err);
            }
            
            document.body.removeChild(tempInput);
            fetchNewQuote(); // Já carrega a próxima para ficar pronta
        }

        function flashRed() {
            const originalColor = document.body.style.backgroundColor;
            document.body.style.backgroundColor = 'red';
            setTimeout(() => {
                document.body.style.backgroundColor = originalColor;
            }, 100);
        }

        function renderPiano() {
            const piano = document.getElementById('piano');
            let html = "";
            for (let i = 21; i <= 108; i++) {
                const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
                if (!isBlack) {
                    const nextIsBlack = [1, 3, 6, 8, 10].includes((i + 1) % 12);
                    let blackHTML = nextIsBlack ? `<div class="key black" data-note="${i+1}"></div>` : '';
                    html += `<div class="relative flex-none"><div class="key white" data-note="${i}"></div>${blackHTML}</div>`;
                }
            }
            piano.innerHTML = html;

            piano.querySelectorAll('.key').forEach(key => {
                key.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    flashRed();
                });
            });
        }

        function playChord(noteList) {
            if (!instrument) return;
            const now = audioCtx.currentTime;
            noteList.forEach(n => {
                const node = instrument.play(n, now, { gain: state.vol });
                node.stop(now + state.release);
                
                const el = document.querySelector(`.key[data-note="${n}"]`);
                if (el) {
                    el.classList.add('active');
                    setTimeout(() => el.classList.remove('active'), 200);
                }
            });
        }

        window.addEventListener('keydown', (e) => {
            if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
            if (e.repeat) return;
            
            const data = typewriterData.noteMap[e.code];
            if (data) {
                if (!audioCtx) initAudio();
                playChord(data.notes);
                addToTypewriter(data.name);
            }
        });

        document.getElementById('instrument-select').addEventListener('change', (e) => {
            state.prog = parseInt(e.target.value);
            loadInstrument();
        });

        document.getElementById('main-vol').addEventListener('input', (e) => state.vol = e.target.value / 100);
        
        document.getElementById('reverb-slider').addEventListener('input', (e) => {
            state.reverb = e.target.value / 100;
            if (wetGain) wetGain.gain.setTargetAtTime(state.reverb, audioCtx.currentTime, 0.05);
        });

        document.getElementById('release-slider').addEventListener('input', (e) => {
            state.release = e.target.value / 100;
        });

        document.getElementById('metronome-toggle').addEventListener('click', toggleMetronome);
        document.getElementById('metronome-bpm').addEventListener('input', (e) => {
            metronome.bpm = e.target.value;
            document.getElementById('bpm-val').textContent = metronome.bpm;
            if (metronome.isPlaying) { clearInterval(metronome.timer); metronome.timer = setInterval(playClick, 60000/metronome.bpm); }
        });
        document.getElementById('metronome-vol').addEventListener('input', (e) => metronome.volume = e.target.value / 100);

        document.getElementById('clear-text').addEventListener('click', () => {
            typewriterData.text = "1 ";
            typewriterData.noteCount = 0;
            typewriterData.measureCount = 1;
            document.getElementById('typewriter-display').textContent = "1 ";
            fetchNewQuote();
        });

        document.getElementById('copy-text').addEventListener('click', copyFormatted);

        document.getElementById('toggle-ui-btn').addEventListener('click', () => {
            const panel = document.getElementById('control-panel');
            const btn = document.getElementById('toggle-ui-btn');
            panel.classList.toggle('collapsed');
            if (panel.classList.contains('collapsed')) {
                btn.innerHTML = '<i data-lucide="maximize-2" class="w-4 h-4"></i> Mostrar Controles';
            } else {
                btn.innerHTML = '<i data-lucide="minimize-2" class="w-4 h-4"></i> Ocultar Controles';
            }
            lucide.createIcons();
        });

        document.getElementById('toggle-contrast-btn').addEventListener('click', () => {
            document.body.classList.toggle('high-contrast');
        });

        const sel = document.getElementById('instrument-select');
        gmNames.forEach((n, i) => sel.appendChild(new Option(n, i)));
        sel.value = state.prog; 
        renderPiano();
        
        fetchNewQuote();
        
        document.body.addEventListener('mousedown', () => { if (!audioCtx) initAudio(); }, { once: true });
        
        setTimeout(() => {
            const c4 = document.querySelector('[data-note="60"]');
            if (c4) c4.scrollIntoView({ inline: 'center' });
        }, 500);

    </script>
</body>
</html>
